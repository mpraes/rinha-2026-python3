services:
  lb:
    platform: linux/amd64
    image: 
    user: root
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    volumes:
      - rinha-sockets:/sockets
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"

  api1:
    platform: linux/amd64
    image: 
    command: [api]
    user: root
    environment:

    expose:
      - "8081"
    volumes:
      - rinha-sockets:/sockets
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  api2:
    platform: linux/amd64
    image: 
    command: [api]
    user: root
    environment:
 
    expose:
      - "8082"
    volumes:
      - rinha-sockets:/sockets
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

networks:
  rinha:
    driver: bridge

volumes:
  rinha-sockets: