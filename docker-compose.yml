services:
  lb:
    platform: linux/amd64
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"

  api1:
    platform: linux/amd64
    image: rmoraes4/rinha-api-python:latest
    environment:
      - GUNICORN_CMD_ARGS=--bind 0.0.0.0:8000 --workers 1 --worker-class sync
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  api2:
    platform: linux/amd64
    image: rmoraes4/rinha-api-python:latest
    environment:
      - GUNICORN_CMD_ARGS=--bind 0.0.0.0:8000 --workers 1 --worker-class sync
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

networks:
  rinha:
    driver: bridge
