worker_processes 1;
daemon off;
error_log /dev/stderr error;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;

    upstream api_servers {
        server api1:8000;
        server api2:8000;
    }

    server {
        listen 9999;

        tcp_nodelay on;

        client_body_buffer_size 4k;
        client_max_body_size 4k;

        location / {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
